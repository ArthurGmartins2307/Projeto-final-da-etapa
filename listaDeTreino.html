<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Treinos</title>
    <link rel="stylesheet" href="listaDeTreino.css">
</head>
<body>

<section class="hero">
    <h1 class="gradient-title">Encontre seu exercício</h1>
    <p class="hero-subtitle">Pesquise exercícios e adicione à sua rotina de treinos.</p>
</section>


    <div class="container">

        <!-- CAMPO DE BUSCA (COM OS IDs QUE O JS USA) -->
        <div class="search-container">
            <input type="text" id="treino" placeholder="Digite o exercício...">
            <button id="procurarTreino">Procurar</button>
        </div>

        <!-- RESULTADOS DA BUSCA -->
        <h2 class="gradient-text">Resultados da busca</h2>
        <div id="procurados" class="lista"></div>

        <!-- TREINOS ADICIONADOS -->
        <h2 class="gradient-text">Seu treino</h2>
        <div id="treino2" class="lista"></div>

    </div>

    <script src="listaDeTreino.js"></script>
</body>
</html>
